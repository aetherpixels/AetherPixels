<section class="section">
  <div class="wrap">
    <div id="favorites-signed-out" style="display:none;text-align:center;padding:40px 20px;">
      <p style="color:var(--muted);margin-bottom:20px;">Sign in to view and manage your saved favorites.</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="user-client.js"></script>
<script src="script.js"></script>
<script>
  async function loadFavoritesPage(){
    await sbApplyToPage();
    const user = await userGetSession();

    if(!user){
      document.getElementById('favorites-signed-out').style.display = 'block';
      document.getElementById('favorites-grid').style.display = 'none';
      return;
    }

    const favIds = await favList();
    const wps = window.WALLPAPERS || [];
    const favWallpapers = favIds.map(id => wps.find(w => w.id === id)).filter(Boolean);
    renderWallpaperGrid('#favorites-grid', favWallpapers);

    if(favWallpapers.length === 0){
      document.getElementById('favorites-grid').innerHTML =
        '<div style="grid-column:1/-1;text-align:center;padding:40px 20px;">' +
        '<p style="color:var(--muted);margin-bottom:20px;">No favorites yet — tap the heart on any wallpaper to save it here.</p>' +
        '<a href="category.html?cat=all" class="btn btn-gold">Browse Wallpapers</a></div>';
    }
  }

  loadFavoritesPage().catch(e => console.error(e));
</script>
</body>
