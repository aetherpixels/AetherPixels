<main id="main-content">
<section class="section">
  <div class="wrap">

    <div id="collections-signed-out" style="display:none;text-align:center;padding:40px 20px;">
      <p style="color:var(--muted);margin-bottom:20px;">Sign in to create and manage collections.</p>
      <a href="account.html" class="btn btn-gold">Sign In</a>
    </div>

    <div id="collections-signed-in" style="display:none;">
      <div style="display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;">
        <input type="text" id="new-collection-name" placeholder="New collection name (e.g. Anime)" maxlength="80"
          style="flex:1;min-width:200px;padding:12px 16px;background:var(--card);border:1px solid var(--card-border);border-radius:9px;color:#fff;font-size:14px;">
        <button class="btn btn-gold" onclick="createCollection(this)">+ Create Collection</button>
      </div>

      <div id="collections-list" style="display:flex;flex-direction:column;gap:14px;"></div>
    </div>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="user-client.js"></script>
<script src="script.js"></script>
<script>
  async function createCollection(btn){
    const input = document.getElementById('new-collection-name');
    const name = input.value.trim();
    if(!name){ showToast('Please enter a collection name'); return; }
    btn.disabled = true;
    try{
      await collectionCreate(name);
      input.value = '';
      showToast('✅ Collection created!');
      await renderCollectionsList();
    }catch(err){
      console.error(err);
      showToast('❌ ' + (err.message || 'Could not create collection'));
    }finally{
      btn.disabled = false;
    }
  }

  async function deleteCollectionHandler(id, name){
    if(!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try{
      await collectionDelete(id);
      showToast('Collection deleted');
      await renderCollectionsList();
    }catch(err){
      console.error(err);
      showToast('❌ ' + (err.message || 'Could not delete collection'));
    }
  }

  async function renderCollectionsList(){
    const listEl = document.getElementById('collections-list');
    const collections = await collectionList();

    if(collections.length === 0){
      listEl.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px 0;">No collections yet — create one above to start organizing wallpapers.</p>';
      return;
    }

    const wps = window.WALLPAPERS || [];
    listEl.innerHTML = '';

    for(const col of collections){
      const itemIds = await collectionGetItems(col.id);
      const items = itemIds.map(id => wps.find(w => w.id === id)).filter(Boolean);

      const section = document.createElement('div');
      section.style.cssText = 'background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:20px;';
      section.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <h3 style="font-size:16px;font-weight:700;">📁 ${escapeHtml(col.name)} <span style="color:var(--muted);font-weight:500;font-size:13px;">(${items.length})</span></h3>
          <button class="btn btn-danger btn-sm" style="padding:7px 13px;font-size:12px;" onclick="deleteCollectionHandler(${col.id}, ${JSON.stringify(escapeHtml(col.name))})">🗑️ Delete</button>
        </div>
        <div class="wp-grid" id="collection-grid-${col.id}" role="list"></div>
      `;
      listEl.appendChild(section);

      if(items.length > 0){
        renderWallpaperGrid(`#collection-grid-${col.id}`, items);
      } else {
        document.getElementById(`collection-grid-${col.id}`).innerHTML =
          '<p style="color:var(--muted);grid-column:1/-1;font-size:13.5px;">No wallpapers added yet — open any wallpaper and use "Add to Collection" (coming from the wallpaper page) to add one here.</p>';
      }
    }
  }

  async function initCollectionsPage(){
    await sbApplyToPage();
    const user = await userGetSession();
    if(!user){
      document.getElementById('collections-signed-out').style.display = 'block';
      return;
    }
    document.getElementById('collections-signed-in').style.display = 'block';
    await renderCollectionsList();
  }

  initCollectionsPage().catch(e => console.error(e));
</script>
</body>
