<script>
  let currentTimeframe = 'today';

  async function switchTimeframe(tf){
    currentTimeframe = tf;
    ['today','week','month'].forEach(t => {
      const btn = document.getElementById('tf-'+t);
      btn.classList.toggle('active', t === tf);
      btn.setAttribute('aria-selected', t === tf ? 'true' : 'false');
    });
    await loadTrendingPage();
  }

  async function loadTrendingPage(){
    const grid = document.getElementById('trending-grid');
    grid.innerHTML = Array.from({length:8}).map(()=>'<div class="skeleton skeleton-wp" aria-hidden="true"></div>').join('');

    try{
      const trending = await fetchTrending(currentTimeframe, 16);
      if(trending.length === 0){
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 20px;">' +
          '<p style="color:var(--muted);margin-bottom:20px;">Not enough activity yet for this timeframe — check back soon, or explore the full catalog.</p>' +
          '<a href="category.html?cat=all" class="btn btn-gold">Browse All Wallpapers</a></div>';
        return;
      }
      renderWallpaperGrid('#trending-grid', trending);
    }catch(err){
      console.error('loadTrendingPage:', err);
      renderLoadError('#trending-grid');
    }
  }

  sbApplyToPage()
    .catch(e=>console.error(e))
    .finally(loadTrendingPage);
</script>
